<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SARAVOU – Controle de Estoque</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --brand:     #b13202;
    --brand-dk:  #7a2100;
    --brand-lt:  #d95a28;
    --gold:      #d4a849;
    --gold-lt:   #f0cc7a;
    --cream:     #fdf6ec;
    --smoke:     #f5ede0;
    --ink:       #1a0800;
    --muted:     #7a5a45;
    --row-even:  #fff8f2;
    --row-odd:   #fdf0e4;
    --danger:    #c0392b;
    --ok:        #2e7d32;
    --warn:      #e65100;
    --radius:    10px;
    --shadow:    0 4px 24px rgba(177,50,2,.13);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Lato', sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    padding-bottom: 60px;
  }

  /* ── HEADER ───────────────────────────── */
  header {
    background: linear-gradient(135deg, var(--brand-dk) 0%, var(--brand) 55%, var(--brand-lt) 100%);
    color: #fff;
    padding: 36px 24px 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
    box-shadow: 0 6px 32px rgba(177,50,2,.35);
  }
  header::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(circle at 15% 50%, rgba(212,168,73,.18) 0%, transparent 55%),
      radial-gradient(circle at 85% 20%, rgba(212,168,73,.12) 0%, transparent 50%);
    pointer-events: none;
  }

  /* star-burst decoration */
  header::after {
    content: '✦ ✦ ✦';
    position: absolute;
    bottom: 10px; left: 50%; transform: translateX(-50%);
    color: rgba(212,168,73,.55);
    font-size: 13px;
    letter-spacing: 12px;
  }

  .logo-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 10px;
    position: relative;
    z-index: 1;
  }

  .logo-img {
    width: clamp(180px, 40vw, 300px);
    height: auto;
    filter: drop-shadow(0 4px 16px rgba(0,0,0,.45));
    display: block;
  }

  .brand-sub {
    font-family: 'Cinzel', serif;
    font-size: clamp(.7rem, 2vw, .9rem);
    letter-spacing: .45em;
    color: var(--gold-lt);
    text-transform: uppercase;
    margin-top: -4px;
    opacity: .85;
  }

  .page-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(.85rem, 2.5vw, 1.15rem);
    color: rgba(255,255,255,.88);
    letter-spacing: .12em;
    margin-top: 14px;
    position: relative; z-index: 1;
  }

  /* ── TOOLBAR ──────────────────────────── */
  .toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    justify-content: flex-end;
    padding: 18px 24px 10px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .date-info {
    font-size: .8rem;
    color: var(--muted);
    margin-right: auto;
    font-style: italic;
    font-family: 'Cinzel', serif;
  }

  button {
    cursor: pointer;
    font-family: 'Cinzel', serif;
    border: none;
    border-radius: var(--radius);
    padding: 9px 20px;
    font-size: .78rem;
    letter-spacing: .06em;
    font-weight: 600;
    transition: transform .13s, box-shadow .13s, filter .13s;
  }
  button:hover  { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,.18); filter: brightness(1.07); }
  button:active { transform: translateY(0);    box-shadow: none; }

  .btn-add   { background: var(--brand); color: #fff; }
  .btn-save  { background: var(--gold);  color: var(--ink); }
  .btn-clear { background: #fff; color: var(--danger); border: 1.5px solid var(--danger); }

  /* ── TABLE WRAPPER ────────────────────── */
  .table-wrap {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 16px 24px;
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    background: #fff;
  }

  /* ── THEAD ────────────────────────────── */
  thead tr {
    background: linear-gradient(90deg, var(--brand-dk), var(--brand));
    color: #fff;
  }
  th {
    font-family: 'Cinzel', serif;
    font-size: .72rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    padding: 14px 12px;
    text-align: center;
    font-weight: 600;
    white-space: nowrap;
  }
  th:first-child { text-align: left; padding-left: 18px; }

  /* decorative gold line under thead */
  thead tr::after {
    content: '';
    display: block;
    height: 3px;
    background: var(--gold);
  }

  /* ── TBODY ────────────────────────────── */
  tbody tr:nth-child(even) { background: var(--row-even); }
  tbody tr:nth-child(odd)  { background: var(--row-odd); }
  tbody tr { transition: background .18s; }
  tbody tr:hover { background: #ffe8d6; }

  td {
    padding: 10px 10px;
    text-align: center;
    font-size: .85rem;
    vertical-align: middle;
    border-bottom: 1px solid rgba(177,50,2,.07);
  }
  td:first-child { text-align: left; padding-left: 18px; }

  /* ── INPUTS ───────────────────────────── */
  .inp {
    width: 100%;
    border: 1.5px solid transparent;
    border-radius: 6px;
    padding: 6px 8px;
    font-size: .82rem;
    font-family: 'Lato', sans-serif;
    text-align: center;
    background: rgba(177,50,2,.06);
    color: var(--ink);
    transition: border-color .18s, background .18s;
    outline: none;
  }
  .inp:focus {
    border-color: var(--brand);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(177,50,2,.12);
  }
  .inp-name {
    text-align: left;
    font-weight: 700;
    min-width: 120px;
  }
  .inp-obs { min-width: 120px; font-style: italic; }

  /* ── CURRENT QTY ──────────────────────── */
  .qty-display {
    font-weight: 700;
    font-size: .95rem;
    font-family: 'Cinzel', serif;
    border-radius: 6px;
    padding: 4px 10px;
    display: inline-block;
    min-width: 52px;
  }
  .qty-ok   { color: var(--ok);   background: rgba(46,125,50,.1);  }
  .qty-warn { color: var(--warn); background: rgba(230,81,0,.1);   }
  .qty-bad  { color: var(--danger); background: rgba(192,57,43,.12); }

  /* ── DELETE BTN ───────────────────────── */
  .btn-del {
    background: none;
    color: var(--danger);
    padding: 4px 8px;
    font-size: .78rem;
    border: 1px solid var(--danger);
    border-radius: 6px;
    letter-spacing: 0;
  }
  .btn-del:hover { background: var(--danger); color: #fff; }

  /* ── FOOTER ───────────────────────────── */
  footer {
    text-align: center;
    padding: 24px 16px 0;
    font-size: .72rem;
    color: var(--muted);
    font-family: 'Cinzel', serif;
    letter-spacing: .1em;
  }
  footer span { color: var(--brand); }

  /* ── TOAST ────────────────────────────── */
  #toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--brand);
    color: #fff;
    padding: 10px 26px;
    border-radius: 50px;
    font-family: 'Cinzel', serif;
    font-size: .78rem;
    letter-spacing: .08em;
    box-shadow: 0 6px 24px rgba(177,50,2,.35);
    transition: transform .35s ease, opacity .35s ease;
    opacity: 0;
    pointer-events: none;
    z-index: 999;
  }
  #toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  /* ── RESPONSIVE ───────────────────────── */
  @media (max-width: 680px) {
    th, td { padding: 8px 6px; font-size: .75rem; }
    .toolbar { padding: 12px 12px 6px; }
    button  { padding: 7px 14px; font-size: .72rem; }
    .inp    { padding: 5px 6px; font-size: .75rem; }
  }
</style>
</head>

<script>
/* ── DEFAULT PRODUCTS ────────────────────── */
const DEFAULTS = [
  'Velas Palito','Vela 7 Dias','Cristais','Charuto',
  'Cigarrilha','Anil','Alfazema','Dose de Bebidas'
];

/* ── STORAGE ─────────────────────────────── */
const KEY = 'saravou_stock_v1';

function loadData() {
  try { return JSON.parse(localStorage.getItem(KEY)) || null; }
  catch { return null; }
}
function saveToStorage(rows) {
  localStorage.setItem(KEY, JSON.stringify(rows));
}

/* ── BUILD ROWS FROM DATA ────────────────── */
function getRowData() {
  const rows = [];
  document.querySelectorAll('#tbody tr').forEach(tr => {
    rows.push({
      name:    tr.querySelector('.inp-name').value,
      initial: tr.querySelector('.inp-initial').value,
      weekly:  tr.querySelector('.inp-weekly').value,
      monthly: tr.querySelector('.inp-monthly').value,
      obs:     tr.querySelector('.inp-obs').value,
    });
  });
  return rows;
}

/* ── RENDER ALL ──────────────────────────── */
function renderAll(data) {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  data.forEach(d => addRow(d));
}

/* ── ADD ROW ─────────────────────────────── */
function addRow(data) {
  const tbody = document.getElementById('tbody');
  const tr    = document.createElement('tr');

  const name    = data ? data.name    : '';
  const initial = data ? data.initial : '';
  const weekly  = data ? data.weekly  : '';
  const monthly = data ? data.monthly : '';
  const obs     = data ? data.obs     : '';

  tr.innerHTML = `
    <td><input class="inp inp-name" value="${esc(name)}"    placeholder="Nome do produto" oninput="autoSave()"/></td>
    <td><input class="inp inp-initial" type="number" min="0" value="${esc(initial)}" placeholder="0" oninput="calcRow(this); autoSave()"/></td>
    <td><input class="inp inp-weekly"  type="number" min="0" value="${esc(weekly)}"  placeholder="0" oninput="calcRow(this); autoSave()"/></td>
    <td><input class="inp inp-monthly" type="number" min="0" value="${esc(monthly)}" placeholder="0" oninput="calcRow(this); autoSave()"/></td>
    <td class="td-qty"><span class="qty-display qty-ok">—</span></td>
    <td><input class="inp inp-obs" value="${esc(obs)}" placeholder="Observações…" oninput="autoSave()"/></td>
    <td><button class="btn-del" onclick="delRow(this)">✕</button></td>
  `;
  tbody.appendChild(tr);
  calcRow(tr.querySelector('.inp-initial'));
}

/* ── CALC CURRENT QTY FOR A ROW ─────────── */
function calcRow(inp) {
  const tr   = inp.closest('tr');
  const ini  = parseFloat(tr.querySelector('.inp-initial').value)  || 0;
  const wk   = parseFloat(tr.querySelector('.inp-weekly').value)   || 0;
  const mo   = parseFloat(tr.querySelector('.inp-monthly').value)  || 0;
  const curr = ini - wk - mo;
  const span = tr.querySelector('.qty-display');
  span.textContent = curr;
  span.className   = 'qty-display ' +
    (curr > 10 ? 'qty-ok' : curr > 0 ? 'qty-warn' : 'qty-bad');
}

/* ── DELETE ROW ──────────────────────────── */
function delRow(btn) {
  btn.closest('tr').remove();
  autoSave();
}

/* ── SAVE (manual) ───────────────────────── */
function saveData() {
  saveToStorage(getRowData());
  toast('✦ Dados salvos com sucesso!');
}

/* ── AUTO-SAVE (debounced) ───────────────── */
let _autoTimer;
function autoSave() {
  clearTimeout(_autoTimer);
  _autoTimer = setTimeout(() => saveToStorage(getRowData()), 800);
}

/* ── CLEAR ───────────────────────────────── */
function clearData() {
  if (!confirm('Deseja limpar todos os dados e restaurar os produtos padrão?')) return;
  localStorage.removeItem(KEY);
  renderAll(DEFAULTS.map(n => ({ name: n, initial: '', weekly: '', monthly: '', obs: '' })));
  toast('✦ Dados limpos!');
}

/* ── TOAST ───────────────────────────────── */
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

/* ── ESCAPE HTML ─────────────────────────── */
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

/* ── DATE ────────────────────────────────── */
function setDate() {
  const d = new Date();
  document.getElementById('dateInfo').textContent =
    d.toLocaleDateString('pt-BR', { weekday:'long', day:'2-digit', month:'long', year:'numeric' });
}

/* ── INIT ────────────────────────────────── */
(function init() {
  setDate();
  const saved = loadData();
  if (saved && saved.length) {
    renderAll(saved);
  } else {
    renderAll(DEFAULTS.map(n => ({ name: n, initial: '', weekly: '', monthly: '', obs: '' })));
  }
})();
</script>
</body>
</html>
